<!DOCTYPE html>
<html>
<head>
    <title>Beatmohan's Symphony</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            background: #282c34;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Press Start 2P', cursive;
        }
        
        .title {
            border: 4px solid black;
            padding: 20px 40px;
            margin-bottom: 40px;
            background: white;
            box-shadow: 4px 4px 0px black;
        }
        
        .start-button {
            border: 4px solid black;
            padding: 15px 30px;
            background: white;
            box-shadow: 4px 4px 0px black;
            text-decoration: none;
            color: black;
            transition: all 0.1s;
        }
        
        .start-button:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px black;
        }
    </style>
</head>
<body>
    <div class="title">
        BEATMOHAN'S SYMPHONY
    </div>
    <a href="game.html" id="start-button" class="start-button">
        PUZZLES
    </a>
    <a href="game.html" id="start-button" class="start-button">
        STRUDEL GOLF
    </a>
    <a href="game.html" id="start-button" class="start-button">
        FREE-PLAY
    </a>

    
    <script>
    const button = document.getElementById("start-button");

button.addEventListener("click", function() {
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    function createNote(frequency, startTime, duration) {
        // Square oscillator for that classic 8-bit sound
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(frequency, startTime);
        
        // Quick attack, short decay envelope
        gainNode.gain.setValueAtTime(0, startTime);
        gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.01);
        gainNode.gain.linearRampToValueAtTime(0.15, startTime + 0.1);
        gainNode.gain.linearRampToValueAtTime(0, startTime + duration);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.start(startTime);
        oscillator.stop(startTime + duration);
        
        return oscillator;
    }
    
    // Create a success sound (ascending notes)
    const now = audioContext.currentTime;
    createNote(440, now, 0.1);      // A4
    createNote(554.37, now + 0.1, 0.1);  // C#5
    createNote(659.25, now + 0.2, 0.2);  // E5

    // Navigate to the page after the sound finishes
    setTimeout(function() {
        window.location.href = "game.html";
    }, 1000000); // wait 500ms (0.5 seconds) for the sound to finish

});
  
  </script>
</body>
</html>
